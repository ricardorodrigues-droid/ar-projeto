<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<model-viewer
  src="nova.glb"
  ar
  ar-modes="scene-viewer webxr"
  camera-controls
  auto-rotate
  shadow-intensity="1">
</model-viewer>

</body>
</html>
